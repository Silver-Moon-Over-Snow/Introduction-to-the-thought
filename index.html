<title>习概 · 刷题</title>
<style>  :root {
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --primary-light: #dbeafe;
    --primary-subtle: #eff6ff;
    --success: #16a34a;
    --success-light: #dcfce7;
    --danger: #dc2626;
    --danger-light: #fee2e2;
    --warning: #f59e0b;
    --warning-light: #fef3c7;
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #0f172a;
    --text-muted: #64748b;
    --text-light: #94a3b8;
    --border: #e2e8f0;
    --border-light: #f1f5f9;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-xs: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-hover: 0 4px 16px rgba(0,0,0,0.07);
    --shadow-card: 0 1px 4px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.04);
    --transition: .18s ease;
    --transition-slow: .35s cubic-bezier(.4,0,.2,1);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .layout { display: flex; max-width: 1260px; margin: 0 auto; min-height: 100vh; }

  /* Sidebar */

    background: var(--card);
    width: 270px; min-width: 270px;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh; z-index: 100;
    transition: transform .25s cubic-bezier(.4,0,.2,1);
  }

  .sidebar-header {
    padding: 20px 18px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    position: relative;
    z-index: 1;
  }
  .sidebar-header h2 { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -.2px; }
  .sidebar-close { display: none; background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-light); padding: 2px 6px; border-radius: 4px; line-height: 1; }
  .sidebar-close:hover { background: var(--border); color: var(--text); }
  .sidebar-search { padding: 10px 14px 8px; border-bottom: 1px solid var(--border); }
  .sidebar-search input {
    width: 100%; padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius-xs);
    font-size: 12px; font-family: inherit; outline: none; transition: all var(--transition);
    background: var(--bg); color: var(--text);
  }
  .sidebar-search input::placeholder { color: var(--text-light); }
  .sidebar-search input:focus { border-color: var(--primary); background: var(--card); box-shadow: 0 0 0 3px var(--primary-subtle); }
  .source-filter {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 0 14px 10px;
  }
  .source-filter-btn {
    border: 1px solid var(--border); background: var(--bg); color: var(--text-muted);
    border-radius: 999px; padding: 4px 9px; font-size: 11px; line-height: 1.2;
    font-family: inherit; cursor: pointer; transition: all var(--transition);
  }
  .source-filter-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-subtle); }
  .source-filter-btn.active { border-color: var(--primary); background: var(--primary); color: #fff; }
  .source-filter-empty { padding: 20px 18px; color: var(--text-muted); font-size: 12px; line-height: 1.6; }
  .sidebar-list { flex: 1; overflow-y: auto; padding: 6px 0; position: relative; z-index: 1; }
  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-thumb { background: transparent; border-radius: 4px; }
  .sidebar-list:hover::-webkit-scrollbar-thumb { background: #cbd5e1; }
  .sidebar-list::-webkit-scrollbar-track { background: transparent; }

  .topic-group { margin-bottom: 1px; }
  .topic-group-title {
    font-size: 11px; font-weight: 700; color: var(--text-light);
    letter-spacing: .5px;
    padding: 14px 18px 4px; cursor: default;
    display: flex; align-items: center; gap: 6px;
  }
  .side-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 6px 18px; cursor: pointer; transition: all var(--transition);
    font-size: 12px; line-height: 1.4; border-left: 3px solid transparent;
    position: relative; overflow: hidden;
  }
  .side-item::after {
    content: ''; position: absolute; left: 18px; right: 18px; bottom: 0;
    height: 1.5px; background: var(--primary);
    transform: scaleX(0); transform-origin: left center;
    transition: transform .35s cubic-bezier(.4,0,.2,1);
    border-radius: 1px; opacity: .5;
  }
  .side-item:hover::after { transform: scaleX(1); }
  .side-item.active::after { transform: scaleX(1); opacity: .7; background: var(--primary); }
  .side-item:hover { background: var(--border-light); }
  .side-item.active { background: var(--primary-subtle); border-left-color: var(--primary); }
  .side-item .s-num { font-size: 11px; font-weight: 600; color: var(--text-light); min-width: 24px; text-align: right; flex-shrink: 0; }
  .side-item.active .s-num { color: var(--primary); }
  .side-item .s-body { flex: 1; min-width: 0; }
  .side-item .s-text { color: var(--text); line-height: 1.35; }
  .side-item .s-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .side-item .s-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; display: inline-block; margin-top: 5px;
    transition: transform var(--transition);
  }
  .side-item:hover .s-dot { transform: scale(1.2); }
  .s-dot.pending { background: #d1d5db; }
  .s-dot.correct { background: var(--success); }
  .s-dot.wrong { background: var(--danger); }
  .s-dot.fav { background: var(--warning); }

  .sidebar-toggle {
    display: none; position: fixed; top: 12px; left: 12px; z-index: 200;
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-xs);
    padding: 7px 9px; font-size: 18px; cursor: pointer;
    box-shadow: var(--shadow); line-height: 1; transition: all var(--transition);
  }
  .sidebar-toggle:hover { background: var(--bg); border-color: var(--primary); }

  .header::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(circle at 25% 35%, rgba(255,255,255,.08) 0%, transparent 50%),
      radial-gradient(circle at 75% 65%, rgba(255,255,255,.04) 0%, transparent 40%);
    pointer-events: none;
  }
  .header-content { position: relative; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .header h1 { font-size: 21px; font-weight: 700; letter-spacing: -.2px; }
  .header p { font-size: 13px; opacity: .72; margin-top: 4px; font-weight: 400; }
  .theme-btn {
    background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2); border-radius: 50%;
    width: 32px; height: 32px; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition); flex-shrink: 0;
    backdrop-filter: blur(4px);
  }
  .theme-btn:hover { background: rgba(255,255,255,.22); border-color: rgba(255,255,255,.35); transform: scale(1.08); }

  .top-controls {
    display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap;
    margin: 0 0 12px; min-height: 32px;
  }
  .mode-toggle, .subject-toggle {
    display: inline-flex; align-items: center; gap: 2px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-xs); padding: 3px;
    box-shadow: var(--shadow);
  }
  .mode-btn, .subject-btn {
    border: 0; background: transparent; color: var(--text-muted);
    border-radius: 5px; padding: 6px 12px; font-size: 12px; font-weight: 700;
    font-family: inherit; cursor: pointer; transition: all var(--transition);
    line-height: 1.2;
  }
  .mode-btn:hover, .subject-btn:hover { color: var(--primary); background: var(--primary-subtle); }
  .mode-btn.active, .subject-btn.active { color: #fff; background: var(--primary); box-shadow: 0 1px 4px rgba(37,99,235,.22); }

  /* Stats bar */
  .stats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .stat {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; flex: 1; min-width: 72px; text-align: center;
    cursor: pointer; transition: all var(--transition); user-select: none;
    position: relative; overflow: hidden;
  }
  .stat::after {
    content: ''; position: absolute; left: 14px; right: 14px; bottom: 0;
    height: 2px; border-radius: 1px;
    background: var(--primary);
    transform: scaleX(0); transform-origin: center;
    transition: transform .3s cubic-bezier(.4,0,.2,1);
  }
  .stat:hover::after { transform: scaleX(1); }
  .stat.active::after { transform: scaleX(1); }
  .stat:hover { border-color: var(--primary); transform: translateY(-2px); }
  .stat.active { border-color: var(--primary); background: var(--primary-subtle); }
  .stat .num { font-size: 21px; font-weight: 700; display: block; line-height: 1.3; letter-spacing: -.3px; }
  .stat .label { font-size: 12px; color: var(--text-muted); margin-top: 1px; font-weight: 500; }
  .stat .num.total { color: var(--primary); }
  .stat .num.correct { color: var(--success); }
  .stat .num.wrong { color: var(--danger); }
  .stat .num.fav { color: var(--warning); }
  .stat#statDim .num { color: var(--text-light); }

  .utility-bar {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    margin: -6px 0 18px; flex-wrap: wrap;
  }
  .utility-summary { font-size: 12px; color: var(--text-muted); }
  .utility-actions { display: flex; gap: 6px; flex-wrap: wrap; }

  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 28px 30px; margin-bottom: 16px;
  }

  .card-row { display: flex; gap: 0; align-items: flex-start; margin-bottom: 16px; }
  .card-main-content { flex: 1; min-width: 0; }
  .card-main-content .card {
    margin-bottom: 0;
    border-radius: var(--radius) 0 0 var(--radius);
    border-right: none;
  }
  .practice-banner {
    display: none; align-items: center; justify-content: space-between; gap: 10px;
    margin-bottom: 16px; padding: 10px 12px;
    border: 1px solid var(--primary-light); border-radius: var(--radius-xs);
    background: var(--primary-subtle); color: var(--primary);
    font-size: 12px; font-weight: 700;
  }
  .practice-banner .btn { background: var(--card); padding: 4px 10px; font-size: 11px; color: var(--primary); border-color: var(--primary-light); }
  .comment-panel {
    width: 270px; min-width: 270px;
    background: var(--card);
    border: 1px solid var(--border); border-left: none;
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 24px; position: sticky; top: 24px;
  }
  .comment-panel::before {
    content: ''; position: absolute; left: 0; top: 16px; bottom: 16px; width: 3px;
    background: var(--primary-light); border-radius: 2px;
  }

  .progress-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
  .progress-track { flex: 1; height: 4px; background: #e2e8f0; border-radius: 2px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), #60a5fa);
    border-radius: 2px;
    transition: width var(--transition-slow);
  }
  .progress-text { font-size: 13px; color: var(--text-muted); white-space: nowrap; font-weight: 500; min-width: 60px; text-align: right; }

  .topic-badge {
    display: inline-block;
    background: var(--primary-subtle); color: var(--primary);
    font-size: 12px; font-weight: 700; padding: 3px 14px; border-radius: 20px;
  }
  .tag-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 12px; border-radius: 20px; }
  .tag-source { background: #fef3c7; color: #92400e; }
  .tag-difficulty { background: var(--primary-light); color: var(--primary); }
  .tag-difficulty.hard { background: #fce7f3; color: #9d174d; }
  .tag-difficulty.easy { background: #d1fae5; color: #065f46; }
  .tag-mnemonic { background: #f0f9ff; color: #0369a1; max-width: 100%; white-space: normal; line-height: 1.45; }
  .tag-badge.side-tag { padding: 1px 7px; flex-shrink: 0; font-size: 9px; }
  .tag-badge.side-mnemonic { flex-basis: 100%; max-width: 100%; white-space: normal; line-height: 1.35; }

  .question-text { font-size: 17px; font-weight: 600; line-height: 1.7; margin-bottom: 20px; color: var(--text); }
  .question-meta { display: flex; flex-wrap: wrap; gap: 6px; margin: -12px 0 20px; }
  .question-meta .tag-mnemonic { flex-basis: 100%; width: fit-content; max-width: 100%; }

  .step-indicator {
    display: flex; align-items: center; gap: 8px; margin-bottom: 18px;
    padding: 10px 16px; background: var(--bg); border-radius: 10px;
  }
  .step-dot { display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 500; color: var(--text-muted); transition: color var(--transition); }
  .step-dot.active, .step-dot.done { color: var(--text); }
  .step-dot .circle {
    width: 22px; height: 22px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: #fff;
    background: #d1d5db; transition: all var(--transition);
  }
  .step-dot.active .circle { background: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
  .step-dot.done .circle { background: var(--success); }
  .step-dot .circle-text { font-size: 10px; }
  .step-sep { color: var(--text-light); font-size: 12px; opacity: .35; }
  .step-dot .circle-ring {
    position: absolute; inset: -4px; border-radius: 50%;
    border: 1.5px solid var(--primary);
    transform: scale(0); transition: transform .3s cubic-bezier(.4,0,.2,1);
  }
  .step-dot:hover .circle-ring { transform: scale(1); }
  .step-dot .circle-wrap { position: relative; display: inline-flex; }

  /* Point guess */
  .point-guess-wrap {
    background: var(--warning-light); border: 1px solid #fde68a; border-radius: var(--radius-sm);
    padding: 20px; margin-bottom: 16px;
  }
  .point-guess-wrap .prompt { font-size: 15px; font-weight: 600; margin-bottom: 8px; color: #92400e; }
  .point-guess-wrap .hint { font-size: 13px; color: #b45309; margin-bottom: 14px; }
  .point-input-row { display: flex; gap: 10px; align-items: center; }
  .point-input-row input {
    width: 72px; padding: 8px 10px; border: 2px solid var(--border);
    border-radius: var(--radius-xs); font-size: 17px; font-weight: 700; text-align: center;
    font-family: inherit; outline: none; transition: all var(--transition);
    background: var(--card);
  }
  .point-input-row input:focus { border-color: var(--warning); box-shadow: 0 0 0 3px rgba(245,158,11,.2); }
  .point-input-row .btn-confirm-points {
    background: var(--warning); color: #fff; border: none; padding: 8px 20px;
    border-radius: var(--radius-xs); font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: all var(--transition);
  }
  .point-input-row .btn-confirm-points:hover { background: #d97706; transform: translateY(-1px); }
  .point-input-row .btn-confirm-points:active { transform: translateY(0); }
  .point-feedback { margin-top: 10px; font-size: 13px; font-weight: 500; display: none; }
  .point-feedback.show { display: block; }
  .point-feedback.correct { color: var(--success); }
  .point-feedback.wrong { color: var(--danger); }

  /* Points inputs */
  .points-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .point-item { display: flex; align-items: flex-start; gap: 8px; }
  .point-item .p-label {
    font-size: 13px; font-weight: 600; color: var(--text-muted);
    min-width: 48px; padding-top: 11px; flex-shrink: 0;
  }
  .point-item textarea {
    flex: 1; min-height: 42px; padding: 8px 12px;
    border: 1.5px solid var(--border); border-radius: var(--radius-xs);
    font-size: 13px; font-family: inherit; line-height: 1.6;
    resize: vertical; outline: none; background: var(--bg); color: var(--text);
    transition: all var(--transition);
  }
  .point-item textarea::placeholder { color: var(--text-light); }
  .point-item textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); background: var(--card); }
  .point-item textarea.correct { border-color: var(--success); background: var(--success-light); }
  .point-item textarea.wrong { border-color: var(--danger); background: var(--danger-light); }
  .point-item textarea.reveal { border-color: var(--primary); background: var(--primary-light); }

  .correct-answer-box {
    margin-top: 12px; padding: 14px 16px;
    background: var(--success-light); border: 1px solid #bbf7d0;
    border-radius: var(--radius-xs); font-size: 13px; line-height: 1.7; display: none;
  }
  .correct-answer-box.show { display: block; }
  .correct-answer-box .label { font-weight: 600; color: var(--success); margin-bottom: 4px; display: block; font-size: 12px; }
  .answer-note { margin-top: 8px; color: var(--text-muted); font-size: 12px; line-height: 1.6; }

  .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 20px; }
  .btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 16px; border: 1px solid var(--border); border-radius: var(--radius-xs);
    font-size: 13px; font-weight: 500; cursor: pointer;
    background: var(--card); color: var(--text); transition: all var(--transition);
    font-family: inherit; position: relative; overflow: hidden;
  }
  .btn::after {
    content: ''; position: absolute; left: 16px; right: 16px; bottom: 0;
    height: 1.5px; border-radius: 1px; background: currentColor;
    transform: scaleX(0); transform-origin: center;
    transition: transform .3s cubic-bezier(.4,0,.2,1); opacity: .4;
  }
  .btn:hover::after { transform: scaleX(1); }
  .btn-primary::after, .btn-success::after, .btn-danger::after { background: #fff; opacity: .5; }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .45; cursor: not-allowed; transform: none !important; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }
  .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-success { background: var(--success); color: #fff; border-color: var(--success); }
  .btn-success:hover { background: #15803d; }
  .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
  .btn-danger:hover { background: #b91c1c; }
  .btn-outline-warning { border-color: var(--warning); color: #92400e; }
  .btn-outline-warning:hover { background: var(--warning-light); }
  .btn-outline-warning.active-fav { background: var(--warning-light); border-color: var(--warning); }
  .btn-nav { min-width: 62px; justify-content: center; }
  .btn-nav:disabled { opacity: .3; cursor: not-allowed; transform: none !important; }
  .card-actions .btn-sm { padding: 5px 11px; font-size: 12px; border-radius: var(--radius-xs); }

  .feedback {
    margin-top: 14px; padding: 12px 16px; border-radius: var(--radius-xs);
    font-weight: 500; font-size: 13px; display: none; border: 1px solid transparent;
  }
  .feedback.show { display: block; }
  .feedback.correct { background: var(--success-light); color: #166534; border-color: #bbf7d0; }
  .feedback.wrong { background: var(--danger-light); color: #991b1b; border-color: #fecaca; }

  .list-view { display: none; }
  .list-view.active { display: block; }
  .card-main { display: block; }
  .card-main.hidden { display: none; }
  .list-title-row {
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    margin-bottom: 14px; flex-wrap: wrap;
  }
  .list-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .list-item {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 18px 22px; margin-bottom: 10px; transition: all var(--transition); cursor: pointer;
    position: relative;
  }
  .list-item::before, .list-item::after {
    content: ''; position: absolute; border-color: var(--primary); border-style: solid;
    border-width: 0; transition: all .35s cubic-bezier(.4,0,.2,1);
    pointer-events: none; opacity: 0; border-radius: 0;
  }
  /* top-left corner draws right then down */
  .list-item::before {
    top: 0; left: 0; width: 0; height: 0;
    border-top-width: 2px; border-left-width: 2px;
    border-top-left-radius: 10px;
  }
  /* bottom-right corner draws left then up */
  .list-item::after {
    bottom: 0; right: 0; width: 0; height: 0;
    border-bottom-width: 2px; border-right-width: 2px;
    border-bottom-right-radius: 10px;
  }
  .list-item:hover { border-color: transparent; }
  .list-item:hover::before { width: 24px; height: 24px; opacity: 1; }
  .list-item:hover::after { width: 24px; height: 24px; opacity: 1; }
  .list-item .topic { font-size: 12px; color: var(--primary); font-weight: 600; letter-spacing: .3px; }
  .list-item .q { font-size: 16px; font-weight: 600; margin: 6px 0 4px; line-height: 1.5; }
  .list-item .a { font-size: 14px; color: var(--text-muted); line-height: 1.5; }
  .list-item .meta { display: flex; gap: 6px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
  .list-item .meta .tag { font-size: 12px; padding: 3px 12px; border-radius: 12px; font-weight: 500; }
  .tag-correct { background: var(--success-light); color: #166534; }
  .tag-wrong { background: var(--danger-light); color: #991b1b; }
  .tag-fav { background: var(--warning-light); color: #92400e; }
  .tag-pending { background: #f1f5f9; color: var(--text-muted); }
  .tag-partial { background: #fef9c3; color: #854d0e; }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--text-muted);
    position: relative;
  }

  .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: .35; display: block; }
  .empty-state p { font-size: 15px; }

  .nav-row {
    display: flex; justify-content: space-between; align-items: center;
    gap: 10px; margin-top: 22px; flex-wrap: wrap;
    padding-top: 18px; border-top: 1px solid var(--border);
  }
  .nav-row .mid { display: flex; gap: 10px; align-items: center; }
  .qid-badge {
    font-size: 12px; color: var(--text-muted); font-weight: 600;
    background: var(--bg); padding: 4px 14px; border-radius: 20px;
  }

  .comment-panel .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .comment-panel .panel-header span { font-size: 13px; font-weight: 700; color: var(--text-muted); letter-spacing: .3px; }
  .comment-panel textarea {
    width: 100%; min-height: 100px; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: var(--radius-xs);
    font-size: 13px; font-family: inherit; line-height: 1.6;
    resize: vertical; outline: none; background: var(--bg); color: var(--text);
    transition: all var(--transition);
  }
  .comment-panel textarea::placeholder { color: var(--text-light); }
  .comment-panel textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
  #commentDisplay {
    line-height: 1.7; font-size: 14px; color: var(--text);
    white-space: pre-wrap; display: none; padding: 2px 0;
  }
  .btn-edit {
    font-size: 12px; padding: 3px 11px; border: 1px solid var(--border);
    border-radius: var(--radius-xs); background: var(--card); color: var(--text-muted);
    cursor: pointer; font-family: inherit; transition: all var(--transition);
  }
  .btn-edit:hover { border-color: var(--primary); color: var(--primary); }

  @media (max-width: 768px) {
    .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay.open { display: block; }
    .sidebar-toggle { display: block; }
    .sidebar-close { display: block; }
    .main-area { padding: 14px; }
    .top-controls { padding-left: 42px; }
    .card { padding: 18px; }
    .question-meta { gap: 5px; margin-bottom: 16px; }
    .question-meta .tag-mnemonic { width: 100%; font-size: 11px; padding: 6px 10px; }
    .side-item .s-meta { gap: 3px; }
    .tag-badge.side-mnemonic { display: block; font-size: 9px; padding: 2px 6px; }
    .card-main-content .card { border-radius: var(--radius); border-right: 1px solid var(--border); }
    .card-row { display: block; }
    .practice-banner { align-items: flex-start; }
    .comment-panel {
      display: block;
      width: 100%; min-width: 0;
      margin-top: 12px; padding: 18px;
      position: static;
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .comment-panel::before {
      left: 14px; right: 14px; top: 0; bottom: auto;
      width: auto; height: 3px;
    }
    .header { padding: 18px; }
    .header h1 { font-size: 17px; }
  }
  @media (max-width: 480px) {
    .card { padding: 14px; }
    .header { padding: 14px; }
    .header h1 { font-size: 15px; }
    .question-text { font-size: 14px; }
    .actions .btn { flex: 1; justify-content: center; font-size: 12px; padding: 6px 10px; }
    .stat { padding: 6px 8px; min-width: 60px; }
    .stat .num { font-size: 16px; }
    .stats { gap: 5px; }
  }

  /* Dark mode */
  [data-theme="dark"] {
    --primary: #60a5fa;
    --primary-hover: #3b82f6;
    --primary-light: #1e3a5f;
    --primary-subtle: #172554;
    --success: #4ade80;
    --success-light: #052e16;
    --danger: #f87171;
    --danger-light: #450a0a;
    --warning: #fbbf24;
    --warning-light: #422006;
    --bg: #0b1120;
    --card: #1a2332;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --text-light: #64748b;
    --border: #1e293b;
    --border-light: #1a2332;
  }
  [data-theme="dark"] .sidebar-header h2 { color: var(--text); }
  [data-theme="dark"] .sidebar-header { filter: brightness(1.2) hue-rotate(0deg); }
  [data-theme="dark"] .sidebar-list::-webkit-scrollbar-thumb { background: transparent; }
  [data-theme="dark"] .sidebar-list:hover::-webkit-scrollbar-thumb { background: #334155; }
  [data-theme="dark"] .side-item:hover { background: var(--border-light); }
  [data-theme="dark"] .side-item.active { background: var(--primary-subtle); }
  [data-theme="dark"] .sidebar-toggle:hover { background: #334155; }
  [data-theme="dark"] .sidebar-overlay { background: rgba(0,0,0,0.6); }
  [data-theme="dark"] .sidebar-search input { background: #0b1120; color: var(--text); }

  [data-theme="dark"] .list-item .topic { color: #93c5fd; }
  [data-theme="dark"] .tag-correct { background: #052e16; color: #86efac; }
  [data-theme="dark"] .tag-wrong { background: #450a0a; color: #fca5a5; }
  [data-theme="dark"] .tag-fav { background: #422006; color: #fde68a; }
  [data-theme="dark"] .tag-pending { background: #1e293b; color: #94a3b8; }
  [data-theme="dark"] .tag-partial { background: #422006; color: #fde68a; }
  [data-theme="dark"] .stat.active { background: var(--primary-subtle); }
  [data-theme="dark"] .stat:hover { border-color: var(--primary); }
  [data-theme="dark"] .practice-banner { background: var(--primary-subtle); border-color: #1e3a5f; color: #93c5fd; }
  [data-theme="dark"] .practice-banner .btn { background: #0b1120; color: #93c5fd; border-color: #1e3a5f; }
  [data-theme="dark"] .nav-row .qid-badge { background: #0b1120; }

  [data-theme="dark"] .comment-panel::before { background: var(--primary-light); }
  [data-theme="dark"] .comment-panel textarea { background: #0b1120; }
  [data-theme="dark"] .comment-panel textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-subtle); }

<body>

<!-- Mobile toggle -->
<button class="sidebar-toggle" id="sidebarToggle" aria-label="打开目录">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="layout">

  <!-- ===== SIDEBAR ===== -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>📋 题目目录</h2>
      <button class="sidebar-close" id="sidebarClose" aria-label="关闭目录">✕</button>
    </div>
    <div class="sidebar-search">
      <input type="text" id="sidebarSearch" placeholder="搜索题目…" autocomplete="off">
    </div>
    <div class="source-filter" id="sourceFilter" aria-label="按题目来源筛选"></div>
    <div class="sidebar-list" id="sidebarList"></div>
  </div>

  <!-- ===== MAIN ===== -->
  <div class="main-area">

    <div class="top-controls">
      <div class="subject-toggle" id="subjectToggle" aria-label="选择科目">
        <button class="subject-btn" id="subjectXigai" type="button" data-subject="习概">习概</button>
        <button class="subject-btn" id="subjectShigang" type="button" data-subject="史纲">史纲</button>
      </div>
      <div class="mode-toggle" id="studyModeToggle" aria-label="选择学习模式">
        <button class="mode-btn" id="modeMemory" type="button" data-mode="memory">记忆</button>
        <button class="mode-btn" id="modeDictation" type="button" data-mode="dictation">默写</button>
      </div>
    </div>

    <div class="header">
      <div class="header-cloud"></div>
          <div class="header-content">
        <div>
          <h1 id="appTitle">📖 习概 · 简答题刷题</h1>
          <p id="appSubtitle">先判断要点数 → 再默写完整答案 → 核对 · 收藏 · 错题集</p>
        </div>
        <button class="theme-btn" id="themeToggle" aria-label="切换主题">🌙</button>
      </div>
    </div>

    <div class="stats" id="stats">
      <div class="stat" data-view="main">
        <span class="num total" id="statTotal">0</span>
        <span class="label">总题</span>
      </div>
      <div class="stat" data-view="wrong">
        <span class="num wrong" id="statWrong">0</span>
        <span class="label">❌ 错题</span>
      </div>
      <div class="stat" data-view="fav">
        <span class="num fav" id="statFav">0</span>
        <span class="label">⭐ 收藏</span>
      </div>
      <div class="stat" data-view="done">
        <span class="num correct" id="statDone">0</span>
        <span class="label">✅ 已答</span>
      </div>
      <div class="stat" data-view="dismissed" id="statDim">
        <span class="num" id="statDimNum" style="color:#6b7280;">0</span>
        <span class="label">🗑 已斩</span>
      </div>
    </div>

    <div class="utility-bar">
      <div class="utility-summary" id="utilitySummary">已保存到本机浏览器</div>
      <div class="utility-actions">
        <button class="btn btn-sm" id="btnExport" style="font-size:12px;padding:5px 10px;">⬇ 导出进度</button>
        <button class="btn btn-sm" id="btnImport" style="font-size:12px;padding:5px 10px;">⬆ 导入进度</button>
        <input type="file" id="importFile" accept="application/json,.json" hidden>
      </div>
    </div>

    <!-- Main card -->
    <div class="card-main" id="cardMain">
      <div class="card-row">
        <div class="card-main-content">
          <div class="card">

        <div class="practice-banner" id="practiceBanner">
          <span id="practiceText">专项刷题</span>
          <button class="btn btn-sm" id="exitPractice" type="button">退出专项</button>
        </div>

        <!-- Progress -->
        <div class="progress-wrap">
          <span class="progress-text" id="progressText">0 / 0</span>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
          </div>
        </div>

        <!-- Topic + Tags + Action buttons row -->
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;justify-content:space-between;">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <div class="topic-badge" id="topicBadge">导论</div>
          </div>
          <div class="card-actions" style="display:flex;gap:6px;flex-wrap:wrap;">
            <button class="btn btn-sm btn-outline-warning" id="btnFav" style="font-size:12px;padding:4px 10px;">☆ 收藏</button>
            <button class="btn btn-sm" id="btnDim" style="font-size:12px;padding:4px 10px;border-color:#6b7280;color:#6b7280;display:none;">🗑 斩题</button>
            <button class="btn btn-sm btn-danger" id="btnClear" style="font-size:12px;padding:4px 10px;display:none;">↺ 重答</button>
            <button class="btn btn-sm" id="btnComment" style="font-size:12px;padding:4px 10px;border-color:#94a3b8;color:#64748b;">💬 备注</button>
          </div>
        </div>

        <!-- Question -->
        <div class="question-text" id="questionText">加载中…</div>
        <div class="question-meta" id="questionMeta">
          <span class="tag-badge tag-source" id="sourceTag" style="display:none"></span>
          <span class="tag-badge tag-difficulty" id="diffTag" style="display:none"></span>
          <span class="tag-badge tag-mnemonic" id="mnemonicTag" style="display:none"></span>
        </div>


        <!-- Step indicator -->
        <div class="step-indicator" id="stepIndicator">
          <span class="step-dot" id="step1">
            <span class="circle-wrap"><span class="circle">1</span><span class="circle-ring"></span></span> 判断要点数
          </span>
          <span style="color:var(--text-muted);font-size:14px;">→</span>
          <span class="step-dot" id="step2">
            <span class="circle-wrap"><span class="circle">2</span><span class="circle-ring"></span></span> 默写答案
          </span>
          <span style="color:var(--text-muted);font-size:14px;">→</span>
          <span class="step-dot" id="step3">
            <span class="circle-wrap"><span class="circle">3</span><span class="circle-ring"></span></span> 核对
          </span>
        </div>

        <!-- Point guess -->
        <div class="point-guess-wrap" id="pointGuess">
          <div class="prompt">💡 你认为这道题的答案包含几个要点？</div>
          <div class="hint">提示：先思考答案的结构，再输入你的判断</div>
          <div class="point-input-row">
            <input type="number" id="pointInput" min="1" max="10" placeholder="?">
            <button class="btn-confirm-points" id="btnConfirmPoints">确定</button>
          </div>
          <div class="point-feedback" id="pointFeedback"></div>
        </div>

        <!-- Answer area -->
        <div class="answer-area" id="answerArea"></div>

        <!-- Feedback -->
        <div class="feedback" id="feedback"></div>

        <!-- Actions -->
        <div class="actions">
          <button class="btn btn-primary" id="btnCheck" style="display:none">✅ 核对</button>
          <button class="btn btn-success" id="btnShow" style="display:none">👁 显示答案</button>
        </div>

        <!-- Navigation -->
        <div class="nav-row">
          <button class="btn btn-nav" id="btnPrev">◀ 上一题</button>
          <div class="mid">
            <span class="qid-badge" id="qidDisplay">#1</span>
          </div>
          <button class="btn btn-nav" id="btnNext">下一题 ▶</button>
        </div>

          </div>
        </div><!-- end card-main-content -->

        <!-- Comment panel (right side, separate from card) -->
        <div id="commentArea" class="comment-panel">
          <div class="panel-header">
            <span>📝 备注</span>
            <button id="commentEditBtn" class="btn-edit" style="display:none;">✏️ 编辑</button>
          </div>
          <textarea id="commentInput" placeholder="写备注，按 Enter 保存…"></textarea>
          <div id="commentDisplay"></div>
        </div>

      </div><!-- end card-row -->
    </div><!-- end card-main -->
    
    <div class="list-view" id="viewWrong">
      <div class="list-title-row">
        <h2 style="font-size:18px;">❌ 错题本</h2>
        <div class="list-actions">
          <button class="btn btn-sm btn-primary" id="startWrong" type="button">▶ 开刷错题</button>
          <button class="btn btn-sm btn-danger" id="clearWrong">清空错题</button>
        </div>
      </div>
      <div id="wrongList"></div>
    </div>
    <div class="list-view" id="viewFav">
      <div class="list-title-row">
        <h2 style="font-size:18px;">⭐ 收藏本</h2>
        <div class="list-actions">
          <button class="btn btn-sm btn-primary" id="startFav" type="button">▶ 开刷收藏</button>
          <button class="btn btn-sm btn-danger" id="clearFav">清空收藏</button>
        </div>
      </div>
      <div id="favList"></div>
    </div>
    <div class="list-view" id="viewDone">
      <h2 style="font-size:18px;margin-bottom:14px;">✅ 已答题</h2>
      <div id="doneList"></div>
    </div>

    <!-- List: Dismissed -->
    <div class="list-view" id="viewDismissed">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <h2 style="font-size:18px;">🗑 已斩题</h2>
        <button class="btn btn-sm btn-danger" id="restoreAll">恢复全部</button>
      </div>
      <div id="dismissedList"></div>
    </div>

  </div>
</div>

<script>
// ========== DATA ==========
const QUESTIONS = [

// ========== HELPERS ==========
function isPointsObvious(q) {
  if (q.points <= 2) return true;
  const text = q.question;
  const numMap = { '一':1,'二':2,'两':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10 };
  for (const [cn, n] of Object.entries(numMap)) {
    if (n === q.points && text.includes(cn)) return true;
  }
  return false;
}

// ========== RENDER ==========
function matchAnswers(userVals, correctVals) {
  const used = new Array(correctVals.length).fill(false);
  const matched = new Array(userVals.length).fill(false);
  for (let i = 0; i < userVals.length; i++) {
    for (let j = 0; j < correctVals.length; j++) {
      if (!used[j] && normalize(userVals[i]) === normalize(correctVals[j])) {
        used[j] = true;
        matched[i] = true;
        break;
      }
    }
  }
  const allCorrect = matched.length === correctVals.length && matched.every(m => m);
  return { matched, allCorrect };
}

function normalize(str) {
  let s = str.trim();
  // Remove all punctuation and extra whitespace
  s = s.replace(/[，、；：。！？\s"「」《》〈〉——……·・\.\,\!\?\-\/\(\)（）]/g, '');
  // Normalize conjunction synonyms
  s = s.replace(/[与]/g, '和');
  s = s.replace(/[及]/g, '和');
  s = s.replace(/[为]/g, '是');
  return s.toLowerCase();
}

function fuzzyMatch(userAnswer, correctAnswer) {
  const u = normalize(userAnswer);
  const c = normalize(correctAnswer);
  if (!u || !c) return false;
  if (u === c) return true;
  const items = c.split(/[、,，]/).filter(s => s.length > 1);
  if (items.length > 1) {
    if (items.every(item => u.includes(item))) return true;
  }
  let ci = 0;
  for (let i = 0; i < u.length && ci < c.length; i++) {
    if (u[i] === c[ci]) ci++;
  }
  return ci >= c.length * 0.7;
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[ch]));
}

function renderAnswerHtml(q) {
  const note = q.note ? `<div class="answer-note">${escapeHtml(q.note)}</div>` : '';
  return `<div>${escapeHtml(q.answer)}</div>${note}`;
}

function getQuestionTags(q) {
  const raw = q.tags || q.tag || [];
  const list = Array.isArray(raw) ? raw : String(raw).split(/[,，/、|]/);
  const extra = [
    ...(SOURCE_TAG_OVERRIDES[q.question] || []),
    ...(EXAM_TAG_OVERRIDES[q.question] || [])
  ];
  return [...new Set([...list, ...extra].map(tag => String(tag).trim()).filter(Boolean))];
}

function renderSourceBadges(q, extraClass = '') {
  return getQuestionTags(q)
    .map(tag => `<span class="tag-badge tag-source${extraClass ? ' ' + extraClass : ''}">${escapeHtml(tag)}</span>`)
    .join('');
}

function getQuestionSubject(q) {
  return q.subject || '习概';
}

function getSubjectNames() {
  return [...new Set(QUESTIONS.map(getQuestionSubject))];
}

function subjectMatches(idx, subject = state.subjectFilter) {
  return getQuestionSubject(QUESTIONS[idx]) === subject;
}

function questionVisibleInFilters(idx, filter = state.sourceFilter, subject = state.subjectFilter) {
  return subjectMatches(idx, subject) && (filter === 'all' || getQuestionTags(QUESTIONS[idx]).includes(filter));
}

function getPracticeLabel(mode = state.practiceMode) {
  if (mode === 'wrong') return '错题专项';
  if (mode === 'fav') return '收藏专项';
  return '全部题目';
}

function practiceMatches(idx, mode = state.practiceMode) {
  if (mode === 'all') return true;
  if (Array.isArray(state.practiceIds) && state.practiceIds.length) return state.practiceIds.includes(idx);
  if (mode === 'wrong') return state.wrongIds.has(idx);
  if (mode === 'fav') return state.favorites.has(idx);
  return true;
}

  return QUESTIONS
    .map((_, i) => i)
    .filter(i => !state.dismissedIds.has(i) && questionVisibleInFilters(i, filter))
    .filter(i => mode === 'wrong' ? state.wrongIds.has(i) : state.favorites.has(i));
}

function getSourceTags() {
  return [...new Set(QUESTIONS
    .filter((q, i) => subjectMatches(i) && practiceMatches(i))
    .flatMap(getQuestionTags))];
}

if (state.sourceFilter !== 'all' && !getSourceTags().includes(state.sourceFilter)) {
  state.sourceFilter = 'all';
}

function sourceMatches(idx, filter = state.sourceFilter) {
  return questionVisibleInFilters(idx, filter);
}

function activeQuestionIds(filter = state.sourceFilter) {
  return QUESTIONS
    .map((_, i) => i)
    .filter(i => !state.dismissedIds.has(i) && questionVisibleInFilters(i, filter) && practiceMatches(i));
}

function allVisibleQuestionIds(filter = state.sourceFilter) {
  return QUESTIONS.map((_, i) => i)
    .filter(i => questionVisibleInFilters(i, filter) && practiceMatches(i))
    .filter(i => state.practiceMode === 'all' || !state.dismissedIds.has(i));
}

function updateSaveSummary() {
  if (!el.utilitySummary) return;
  const done = state.answered.filter(Boolean).length;
  const wrong = state.wrongIds.size;
  const fav = state.favorites.size;
  const dismissed = state.dismissedIds.size;
  el.utilitySummary.textContent = `已保存到本机浏览器：已答 ${done} / ${QUESTIONS.length}，错题 ${wrong}，收藏 ${fav}，已斩 ${dismissed}`;
}

function exportProgress() {
  const payload = {
    app: 'xigai-review',
    version: 1,
    exportedAt: new Date().toISOString(),
    questionCount: QUESTIONS.length,
    session: {
      answered: state.answered,
      results: state.results,
      userPoints: state.userPoints
    },
    favorites: [...state.favorites],
    wrongIds: [...state.wrongIds],
    dismissedIds: [...state.dismissedIds],
    userInputs: state.userInputs,
    comments: state.comments,
    theme: localStorage.getItem('xigai_theme') || document.documentElement.getAttribute('data-theme') || 'light'
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  link.href = url;
  link.download = `习概刷题进度-${date}.json`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

function applyImportedProgress(data) {
  const source = data.session ? data : {
    session: {
      answered: data.answered,
      results: data.results,
      userPoints: data.userPoints
    },
    favorites: data.favorites,
    wrongIds: data.wrongIds,
    dismissedIds: data.dismissedIds,
    userInputs: data.userInputs,
    comments: data.comments,
    theme: data.theme
  };
  const importedSession = source.session || {};
  state.answered = Array.isArray(importedSession.answered) ? importedSession.answered.slice(0, QUESTIONS.length) : new Array(QUESTIONS.length).fill(false);
  state.results = Array.isArray(importedSession.results) ? importedSession.results.slice(0, QUESTIONS.length) : new Array(QUESTIONS.length).fill(null);
  while (state.answered.length < QUESTIONS.length) state.answered.push(false);
  while (state.results.length < QUESTIONS.length) state.results.push(null);
  state.userPoints = importedSession.userPoints && typeof importedSession.userPoints === 'object' ? importedSession.userPoints : {};
  state.favorites = new Set(Array.isArray(source.favorites) ? source.favorites.filter(id => id >= 0 && id < QUESTIONS.length) : []);
  state.wrongIds = new Set(Array.isArray(source.wrongIds) ? source.wrongIds.filter(id => id >= 0 && id < QUESTIONS.length) : []);
  state.dismissedIds = new Set(Array.isArray(source.dismissedIds) ? source.dismissedIds.filter(id => id >= 0 && id < QUESTIONS.length) : []);
  state.userInputs = source.userInputs && typeof source.userInputs === 'object' ? source.userInputs : {};
  state.comments = source.comments && typeof source.comments === 'object' ? source.comments : {};
  if (source.theme === 'dark' || source.theme === 'light') {
    document.documentElement.setAttribute('data-theme', source.theme);
    localStorage.setItem('xigai_theme', source.theme);
    document.getElementById('themeToggle').textContent = source.theme === 'dark' ? '☀️' : '🌙';
  }
  state.current = activeQuestionIds()[0] ?? 0;
  state.checked = state.results[state.current] !== null;
  saveState();
  buildSidebar();
  restoreQuestionState();
  switchView(activeQuestionIds().length ? 'main' : 'dismissed');
}

function enterCommentMode() {
  const area = document.getElementById('commentArea');
  const input = document.getElementById('commentInput');
  const display = document.getElementById('commentDisplay');
  const editBtn = document.getElementById('commentEditBtn');
  if (!area || !input || !display) return;
  input.style.display = 'block';
  display.style.display = 'none';
  if (editBtn) editBtn.style.display = 'none';
  input.focus();
}

function displayCommentMode() {
  const area = document.getElementById('commentArea');
  const input = document.getElementById('commentInput');
  const display = document.getElementById('commentDisplay');
  const editBtn = document.getElementById('commentEditBtn');
  if (!area || !input || !display) return;
  const text = state.comments && state.comments[state.current];
  input.style.display = 'none';
  if (editBtn) editBtn.style.display = text ? 'inline-block' : 'none';
  if (text) {
    display.textContent = text;
    display.style.display = 'block';
  } else {
    display.style.display = 'none';
  }
}

function saveComment(qIdx) {
  const input = document.getElementById('commentInput');
  if (!input) return;
  state.comments[qIdx] = input.value.trim() || '';
  saveState();
  // Update button indicator
  el.btnComment.style.color = state.comments[qIdx] ? '#2563eb' : '#64748b';
  el.btnComment.style.borderColor = state.comments[qIdx] ? '#2563eb' : '#94a3b8';
}

function compactMemoryPart(text) {
  let s = String(text || '').trim();
  s = s.replace(/[“”"《》〈〉（）()]/g, '');
  s = s.replace(/中国特色社会主义/g, '中特社');
  s = s.replace(/社会主义现代化/g, '现代化');
  s = s.replace(/马克思主义/g, '马克思');
  s = s.replace(/全过程人民民主/g, '全过程民主');
  s = s.replace(/人类命运共同体/g, '命运共同体');
  s = s.replace(/中国共产党/g, '党');
  s = s.replace(/、/g, '，');
  const firstChunk = s.split(/[，,；;。]/).find(Boolean) || s;
  s = firstChunk
    .replace(/什么样的|怎样|如何|为什么/g, '')
    .replace(/^(坚持和发展|坚持|建设|推进|全面|加快|不断|正确处理|构建|维护|促进|发展|实现|完善|健全|加强|弘扬|贯彻|开辟|推动|创造|形成|落实)/, '');
  s = s.replace(/^全(?=涵盖|覆盖|链条|贯通)/, '');
  if (s.length < 2) s = firstChunk;
  return s.length > 6 ? s.slice(0, 4) : s;
}

function getMnemonic(q, compact = false) {
  const manual = q.mnemonic || MNEMONIC_OVERRIDES[q.question];
  if (manual) return compact && manual.length > 34 ? manual.slice(0, 33) + '…' : manual;
  const parts = q.blanks.map(compactMemoryPart).filter(Boolean);
  if (!parts.length) return '';
  const hasLong = q.blanks.some(b => String(b).length > 18);
  const initials = parts.map(p => p[0]).join('');
  if (compact) {
    const text = hasLong ? `抓手：${parts.slice(0, 3).join('/')}` : `口诀：${initials}`;
    return text.length > 34 ? text.slice(0, 33) + '…' : text;
  }
  if (q.blanks.length === 1) return `抓手：${parts[0]}`;
  if (q.blanks.length > 8) return `抓手：${parts.slice(0, 8).join(' / ')}…`;
  if (hasLong) return `抓手：${parts.join(' / ')}`;
  return `口诀：${initials}（${parts.join(' / ')}）`;
}

function canShowMnemonic(qIdx, allowCurrentChecked = false) {
  return state.studyMode === 'memory' ||
         (state.answered[qIdx] && state.results[qIdx] !== null) ||
         (allowCurrentChecked && qIdx === state.current && state.checked && state.answered[qIdx]);
}

function getReciteInfo(q) {
  const lengths = q.blanks.map(b => String(b).length);
  const total = lengths.reduce((sum, n) => sum + n, 0);
  const max = Math.max(...lengths, 0);
  const points = q.points || q.blanks.length;
  const hard = total > 95 || max > 30 || points >= 8 || (points >= 5 && total > 70) || (points >= 4 && max > 22);
  if (hard) return { label: '背诵难', cls: 'hard' };
  const medium = total > 30 || max > 12 || points >= 4;
  if (medium) return { label: '背诵中', cls: '' };
  return { label: '背诵易', cls: 'easy' };
}

  if (mode !== 'memory' && mode !== 'dictation') return;
  state.studyMode = mode;
  localStorage.setItem('xigai_study_mode', mode);
  updateStudyModeToggle();
  buildSidebar();
  restoreQuestionState();
  if (state.view === 'main') renderQuestion(state.current);
  else switchView(state.view);
}

function setSubjectFilter(subject) {
  if (!getSubjectNames().includes(subject)) return;
  state.subjectFilter = subject;
  resetPracticeMode(false);
  localStorage.setItem('xigai_subject_filter', subject);
  if (state.sourceFilter !== 'all' && !getSourceTags().includes(state.sourceFilter)) {
    state.sourceFilter = 'all';
    localStorage.setItem('xigai_source_filter', state.sourceFilter);
  }
  const activeIds = activeQuestionIds();
  state.current = activeIds[0] ?? allVisibleQuestionIds()[0] ?? 0;
  restoreQuestionState();
  buildSidebar();
  updateSubjectUI();
  switchView(activeIds.length ? 'main' : 'dismissed');
  updateStats();
  updateSaveSummary();
}

function renderQuestion(qIdx) {
  const q = QUESTIONS[qIdx];
  if (!q) return;
  const isMemoryMode = state.studyMode === 'memory';
  updateStudyModeToggle();
  updateSubjectUI();
  updatePracticeUI();

  el.topic.textContent = q.topic;
  // Update tags
  const srcTag = document.getElementById('sourceTag');
  const diffTagEl = document.getElementById('diffTag');
  const mnemonicTag = document.getElementById('mnemonicTag');
  const sourceTags = getQuestionTags(q);
  if (sourceTags.length) { srcTag.textContent = sourceTags.join(' / '); srcTag.style.display = 'inline-block'; }
  else { srcTag.style.display = 'none'; }
  const recite = getReciteInfo(q);
  diffTagEl.textContent = recite.label;
  diffTagEl.className = 'tag-badge tag-difficulty';
  if (recite.cls) diffTagEl.classList.add(recite.cls);
  diffTagEl.style.display = 'inline-block';
  const mnemonic = canShowMnemonic(qIdx, true) ? getMnemonic(q) : '';
  if (mnemonic) { mnemonicTag.textContent = mnemonic; mnemonicTag.style.display = 'inline-block'; }
  else { mnemonicTag.style.display = 'none'; }
  el.question.textContent = q.question;
  el.question.textContent = q.question;

  if (el.stepIndicator) el.stepIndicator.style.display = isMemoryMode ? 'none' : '';

  // Determine phases
  // Skip point-guess step when the number is obvious
  const pointsObvious = isPointsObvious(q);
  const savedPoints = state.userPoints[qIdx];
  const savedArr = Array.isArray(state.userInputs[qIdx]) ? state.userInputs[qIdx] : [];
  const hasAnyInput = savedArr.some(v => v.trim());
  const stepDone = pointsObvious || savedPoints !== undefined || state.pointsDone || hasAnyInput;

  const phase = state.checked ? 3 :
                (hasAnyInput || stepDone) ? 2 :
                (savedPoints !== undefined) ? 2 : 1;

  // Step indicators
  el.step1.className = 'step-dot' + (phase >= 1 ? (phase > 1 ? ' done' : ' active') : '');
  el.step2.className = 'step-dot' + (phase >= 2 ? (phase > 2 ? ' done' : ' active') : '');
  el.step3.className = 'step-dot' + (phase === 3 ? ' active' : '');

  // Memory mode: read the answer directly without recording answer progress.
  if (isMemoryMode) {
    el.pointGuess.style.display = 'none';
    el.answerArea.style.display = 'block';
    el.answerArea.innerHTML = `<div class="correct-answer-box show" id="correctAnswerBox">
      <span class="label">参考答案</span>
      ${renderAnswerHtml(q)}
    </div>`;
    el.btnCheck.style.display = 'none';
    el.btnShow.style.display = 'none';
    el.btnClear.style.display = 'none';
    el.btnFav.style.display = 'inline-flex';
    el.btnDim.style.display = 'inline-flex';
    el.btnDim.innerHTML = state.dismissedIds.has(qIdx) ? '↩ 恢复' : '🗑 斩题';
    el.feedback.classList.remove('show', 'correct', 'wrong');
    el.feedback.style.display = 'none';
  } else if (phase === 1) {
    el.pointGuess.style.display = 'block';
    el.pointFeedback.classList.remove('show', 'correct', 'wrong');
    el.pointInput.value = '';
    el.pointInput.disabled = false;
    el.btnPoints.textContent = '确定';
    el.answerArea.innerHTML = '';
    el.answerArea.style.display = 'none';
    el.btnCheck.style.display = 'none';
    el.btnShow.style.display = 'none';
    el.btnFav.style.display = 'none';
    el.btnClear.style.display = 'none';
    el.btnDim.style.display = 'none';
    setTimeout(() => el.pointInput.focus(), 50);
  } else {
    el.pointGuess.style.display = 'none';
    el.answerArea.style.display = 'block';

    // Phase 2/3: individual textareas per point
    const savedArray = Array.isArray(state.userInputs[qIdx]) ? state.userInputs[qIdx] : [];
    let allDisabled = false;
    let globalCls = '';

    if (state.checked && state.results[qIdx] !== null) {
      allDisabled = true;
      globalCls = state.results[qIdx] ? 'correct' : 'wrong';
    } else if (state.checked) {
      allDisabled = true;
      globalCls = 'reveal';
    }

    // Build individual point inputs
    let ptsHtml = '<div class="points-list">';
    for (let i = 0; i < q.blanks.length; i++) {
      let val = savedArray[i] !== undefined ? savedArray[i] : '';
      let cls = '';
      if (state.checked && state.results[qIdx] !== null) {
        // Show user's original input with correct/wrong styling
        const userVals = savedArray.slice(0, q.blanks.length);
        if (q.blanks.length === 1) {
          // Single point: fuzzy match against full answer
          cls = fuzzyMatch(userVals[0] || '', q.answer) ? 'correct' : 'wrong';
          val = userVals[0] || '';
        } else {
          // Multi point: order-independent blank matching
          const { matched } = matchAnswers(userVals, q.blanks.map(b => b.trim()));
          cls = matched[i] ? 'correct' : 'wrong';
          val = userVals[i] || '';
        }
      } else if (state.checked) {
        cls = 'reveal';
        val = q.blanks[i];
      }
      const isSingle = q.blanks.length === 1;
      if (isSingle) {
        ptsHtml += `<div class="point-item"><textarea id="pointInput_${i}" class="${cls}" ${allDisabled ? 'disabled' : ''}" placeholder="在此输入答案…" style="min-height:60px;">${escapeHtml(val)}</textarea></div>`;
      } else {
        ptsHtml += `<div class="point-item"><span class="p-label">要点 ${i+1}</span><textarea id="pointInput_${i}" class="${cls}" ${allDisabled ? 'disabled' : ''} placeholder="输入第 ${i+1} 个要点…">${escapeHtml(val)}</textarea></div>`;
      }
    }
    ptsHtml += '</div>';

    ptsHtml += `<div class="correct-answer-box" id="correctAnswerBox">
      <span class="label">📖 参考答案</span>
      ${renderAnswerHtml(q)}
    </div>`;

    el.answerArea.innerHTML = ptsHtml;

    const answerBox = document.getElementById('correctAnswerBox');
    answerBox.classList.toggle('show', state.checked && state.results[qIdx] !== null);

    if (state.checked) {
      el.btnCheck.style.display = 'none';
      el.btnShow.style.display = 'none';
      el.btnFav.style.display = 'inline-flex';
      el.btnClear.style.display = 'inline-flex';
      el.btnDim.style.display = 'inline-flex';
      el.btnDim.innerHTML = state.dismissedIds.has(qIdx) ? '↩ 恢复' : '🗑 斩题';
    } else {
      el.btnCheck.style.display = 'inline-flex';
      el.btnShow.style.display = 'inline-flex';
      el.btnFav.style.display = 'inline-flex';
      el.btnClear.style.display = 'none';
      el.btnDim.style.display = 'inline-flex';
      el.btnDim.innerHTML = state.dismissedIds.has(qIdx) ? '↩ 恢复' : '🗑 斩题';
    }
  }

  // Fav button
  el.btnFav.classList.toggle('active-fav', state.favorites.has(qIdx));
  el.btnFav.textContent = state.favorites.has(qIdx) ? '⭐ 已收藏' : '☆ 收藏';

  // Comment
  const commentArea = document.getElementById('commentArea');
  const commentInput = document.getElementById('commentInput');
  const commentDisplay = document.getElementById('commentDisplay');
  const commentEditBtn = document.getElementById('commentEditBtn');
  const hasComment = state.comments && state.comments[qIdx];
  el.btnComment.style.color = hasComment ? '#2563eb' : '#64748b';
  el.btnComment.style.borderColor = hasComment ? '#2563eb' : '#94a3b8';
  if (commentInput) {
    commentInput.value = hasComment ? state.comments[qIdx] : '';
    commentInput.dataset.qidx = qIdx;
  }
  if (commentArea) {
    if (hasComment) {
      // Show display mode, hide textarea
      if (commentDisplay) {
        commentDisplay.textContent = state.comments[qIdx];
        commentDisplay.style.display = 'block';
      }
      if (commentInput) commentInput.style.display = 'none';
      if (commentEditBtn) commentEditBtn.style.display = 'inline-block';
    } else {
      // No comment yet: show textarea so user can type
      if (commentInput) commentInput.style.display = 'block';
      if (commentDisplay) commentDisplay.style.display = 'none';
      if (commentEditBtn) commentEditBtn.style.display = 'none';
    }
  }
  if (commentInput) { commentInput.dataset.qidx = qIdx; }

  // Progress
  const visibleIds = allVisibleQuestionIds();
  const total = visibleIds.length || QUESTIONS.length;
  const visiblePosition = visibleIds.indexOf(qIdx);
  const shownPosition = visiblePosition >= 0 ? visiblePosition + 1 : qIdx + 1;
  const activeCount = activeQuestionIds().length;
  const sourceLabel = [
    state.practiceMode !== 'all' ? getPracticeLabel() : '',
    state.sourceFilter !== 'all' ? state.sourceFilter : ''
  ].filter(Boolean).join(' · ');
  const progressPrefix = sourceLabel ? `${sourceLabel} · ` : '';
  el.progressText.textContent = `${progressPrefix}${shownPosition} / ${total}`;
  el.progressFill.style.width = `${(shownPosition / total) * 100}%`;
  el.qid.textContent = `#${qIdx + 1}`;

  el.btnPrev.disabled = activeCount <= 1;
  el.btnNext.disabled = activeCount <= 1;

  // Feedback
  if (!isMemoryMode && state.checked && state.results[qIdx] !== null) {
    showFeedback(state.results[qIdx], q);
  } else {
    el.feedback.classList.remove('show', 'correct', 'wrong');
    el.feedback.style.display = 'none';
  }

  updateStats();
  updateSaveSummary();
  updateSidebar();
}

function showFeedback(isCorrect, q) {
  const fb = el.feedback;
  fb.classList.remove('correct', 'wrong');
  fb.classList.add(isCorrect ? 'correct' : 'wrong');
  if (isCorrect) {
    fb.textContent = '✅ 很好！答案基本正确！';
  } else {
    fb.innerHTML = '❌ 有出入，对照参考答案看看吧。';
  }
  fb.style.display = 'block';
  fb.classList.add('show');
}

function updateStats() {
  const visibleIds = allVisibleQuestionIds();
  el.statTotal.textContent = visibleIds.length;
  el.statDone.textContent = visibleIds.filter(id => state.answered[id]).length;
  el.statWrong.textContent = [...state.wrongIds].filter(id => sourceMatches(id)).length;
  el.statFav.textContent = [...state.favorites].filter(id => sourceMatches(id)).length;
  const dimEl = document.getElementById('statDimNum');
  if (dimEl) dimEl.textContent = [...state.dismissedIds].filter(id => sourceMatches(id)).length;
}

// ========== ACTIONS ==========
function resetPracticeMode(render = true) {
  state.practiceMode = 'all';
  state.practiceIds = [];
  if (render) {
    buildSidebar();
    updatePracticeUI();
    updateStats();
  }
}

function startPractice(mode) {
  if (mode !== 'wrong' && mode !== 'fav') return;
  const ids = getPracticeCollectionIds(mode);
  if (!ids.length) {
    const label = mode === 'wrong' ? '错题' : '收藏题';
    const suffix = state.sourceFilter === 'all' ? '' : `（当前来源：${state.sourceFilter}）`;
    alert(`当前没有可刷的${label}${suffix}。`);
    return;
  }
  state.practiceMode = mode;
  state.practiceIds = ids;
  if (!ids.includes(state.current)) state.current = ids[0];
  restoreQuestionState();
  buildSidebar();
  switchView('main');
  updatePracticeUI();
  updateStats();
}

function exitPractice() {
  resetPracticeMode(false);
  const ids = activeQuestionIds();
  if (ids.length && (!ids.includes(state.current) || state.dismissedIds.has(state.current))) {
    state.current = ids[0];
  }
  restoreQuestionState();
  buildSidebar();
  switchView(ids.length ? 'main' : 'dismissed');
  updatePracticeUI();
  updateStats();
}

function confirmPoints() {
  if (state.checked) return;
  const qIdx = state.current;
  const q = QUESTIONS[qIdx];
  const guess = parseInt(el.pointInput.value);
  if (isNaN(guess) || guess < 1) {
    el.pointFeedback.textContent = '⚠️ 请输入一个正整数';
    el.pointFeedback.className = 'point-feedback show wrong';
    return;
  }

  const correct = (guess === q.points);
  state.pointsDone = true;
  state.pointsCorrect = correct;
  state.userPoints[qIdx] = guess;

  el.pointFeedback.innerHTML = correct
    ? `✅ 对的！这道题就是 <strong>${q.points}</strong> 个要点！现在开始默写答案吧 ↓`
    : `❌ 不对哦，这道题有 <strong>${q.points}</strong> 个要点。记住这个结构，现在默写答案 ↓`;
  el.pointFeedback.className = `point-feedback show ${correct ? 'correct' : 'wrong'}`;
  el.pointInput.disabled = true;
  el.btnPoints.textContent = '✓ 已确定';

  // Auto-advance to step 2 after a moment
  setTimeout(() => renderQuestion(qIdx), correct ? 800 : 1800);
}

function checkAnswer() {
  if (state.checked) return;
  const qIdx = state.current;
  const q = QUESTIONS[qIdx];
  const userVals = [];
  let empty = true;
  for (let i = 0; i < q.blanks.length; i++) {
    const ta = document.getElementById('pointInput_' + i);
    const v = ta ? ta.value.trim() : '';
    userVals.push(v);
    if (v) empty = false;
  }
  if (empty) return;
  state.userInputs[qIdx] = userVals;
  let allCorrect;
  if (q.blanks.length === 1) {
    // Single point: compare full user answer against complete answer (fuzzy)
    allCorrect = fuzzyMatch(userVals[0], q.answer);
  } else {
    // Multi point: order-independent blank matching
    const { allCorrect: ac } = matchAnswers(userVals, q.blanks.map(b => b.trim()));
    allCorrect = ac;
  }
  state.checked = true;
  state.answered[qIdx] = true;
  state.results[qIdx] = allCorrect;
  if (allCorrect) state.wrongIds.delete(qIdx);
  else state.wrongIds.add(qIdx);
  saveState();
  renderQuestion(qIdx);
}

function showAnswer() {
  if (state.checked) return;
  const qIdx = state.current;
  const q = QUESTIONS[qIdx];
  const userVals = [];
  for (let i = 0; i < q.blanks.length; i++) {
    const ta = document.getElementById('pointInput_' + i);
    userVals.push(ta ? ta.value.trim() : '');
  }
  state.userInputs[qIdx] = userVals;
  state.checked = true;
  state.answered[qIdx] = true;
  state.results[qIdx] = false;
  state.wrongIds.add(qIdx);
  saveState();
  renderQuestion(qIdx);
}

function clearAnswer() {
  const qIdx = state.current;
  const q = QUESTIONS[qIdx];
  state.checked = false;
  state.answered[qIdx] = false;
  state.results[qIdx] = null;
  delete state.userInputs[qIdx];
  state.wrongIds.delete(qIdx);
  if (!isPointsObvious(q)) {
    state.pointsDone = false;
    state.pointsCorrect = null;
    delete state.userPoints[qIdx];
  } else {
    state.pointsDone = true;
    state.pointsCorrect = true;
    state.userPoints[qIdx] = q.points;
  }
  saveState();
  buildSidebar();
  renderQuestion(qIdx);
  // Focus first point
  const first = document.getElementById('pointInput_0');
  if (first) first.focus();
}

function toggleFav() {
  const qIdx = state.current;
  state.favorites.has(qIdx) ? state.favorites.delete(qIdx) : state.favorites.add(qIdx);
  saveState();
  renderQuestion(qIdx);
}

function dismissQuestion() {
  const qIdx = state.current;
  const wasDismissed = state.dismissedIds.has(qIdx);
  if (wasDismissed) {
    state.dismissedIds.delete(qIdx);
    saveState();
    buildSidebar();
    renderQuestion(qIdx);
    updateStats();
    return;
  }
  state.dismissedIds.add(qIdx);
  // Also clean up its data
  state.results[qIdx] = null;
  state.answered[qIdx] = false;
  delete state.userInputs[qIdx];
  state.wrongIds.delete(qIdx);
  state.favorites.delete(qIdx);
  delete state.userPoints[qIdx];
  saveState();
  const activeIds = activeQuestionIds();
  if (activeIds.length === 0) {
    buildSidebar();
    switchView('dismissed');
    updateStats();
    updateSaveSummary();
    return;
  }
  // Go to next active question
  let next = activeIds.find(id => id > qIdx) ?? activeIds[0];
  state.current = next;
  state.checked = state.results[next] !== null;
  restoreQuestionState();
  buildSidebar();
  renderQuestion(next);
  updateStats();
}

function goPrev() {
  const ids = activeQuestionIds();
  if (!ids.length) return;
  const pos = ids.indexOf(state.current);
  const nextIdx = pos > 0 ? ids[pos - 1] : ids[ids.length - 1];
  state.current = nextIdx;
  state.checked = state.results[nextIdx] !== null;
  restoreQuestionState();
  renderQuestion(nextIdx);
}

function goNext() {
  const ids = activeQuestionIds();
  if (!ids.length) return;
  const pos = ids.indexOf(state.current);
  const nextIdx = pos >= 0 && pos < ids.length - 1 ? ids[pos + 1] : ids[0];
  state.current = nextIdx;
  state.checked = state.results[nextIdx] !== null;
  restoreQuestionState();
  renderQuestion(nextIdx);
}

function restoreQuestionState() {
  const idx = state.current;
  const q = QUESTIONS[idx];
  state.checked = state.results[idx] !== null;
  if (isPointsObvious(q)) {
    state.pointsDone = true;
    state.pointsCorrect = true;
    if (state.userPoints[idx] === undefined) state.userPoints[idx] = q.points;
  } else {
    state.pointsDone = state.userPoints[idx] !== undefined || state.answered[idx];
    state.pointsCorrect = state.pointsDone ? (state.userPoints[idx] === q.points) : null;
  }
}

// ========== VIEW SWITCH ==========
function switchView(view) {
  state.view = view;
  const views = ['cardMain', 'viewWrong', 'viewFav', 'viewDone', 'viewDismissed'];
  views.forEach(v => {
    const el2 = document.getElementById(v);
    const isActive = v === 'cardMain' ? view === 'main' : v === `view${view.charAt(0).toUpperCase() + view.slice(1)}`;
    if (v === 'cardMain') {
      el2.classList.toggle('hidden', !isActive);
      el2.style.display = isActive ? 'block' : 'none';
    } else {
      el2.classList.toggle('active', isActive);
      el2.style.display = isActive ? 'block' : 'none';
    }
  });
  document.querySelectorAll('.stat').forEach(s => s.classList.toggle('active', s.dataset.view === view));
  if (view === 'main') {
    restoreQuestionState();
    renderQuestion(state.current);
  } else if (view === 'wrong') renderList('wrong');
  else if (view === 'fav') renderList('fav');
  else if (view === 'done') renderList('done');
  else if (view === 'dismissed') renderList('dismissed');
}

function renderList(type) {
  let ids, container, emptyMsg;
  if (type === 'wrong') { ids = [...state.wrongIds]; container = el.wrongList; emptyMsg = '🎉 暂无错题，继续保持！'; }
  else if (type === 'fav') { ids = [...state.favorites]; container = el.favList; emptyMsg = '📌 还没有收藏题目'; }
  else if (type === 'dismissed') { ids = [...state.dismissedIds]; container = el.dismissedList; emptyMsg = '🗑 还没有斩过题'; }
  else { ids = QUESTIONS.map((_, i) => i).filter(i => state.answered[i]); container = el.doneList; emptyMsg = '📝 还没有答过题'; }
  ids = ids.filter(id => sourceMatches(id));
  if (state.sourceFilter !== 'all') emptyMsg = `${state.sourceFilter}：${emptyMsg}`;
  if (type === 'wrong' && el.startWrong) el.startWrong.disabled = ids.length === 0;
  if (type === 'fav' && el.startFav) el.startFav.disabled = ids.length === 0;

  if (ids.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-cloud"></div><div class="icon">📭</div><p>${emptyMsg}</p></div>`;
    return;
  }

  let html = '';
  ids.forEach(id => {
    const q = QUESTIONS[id];
    const isCorrect = state.results[id];
    const isFav = state.favorites.has(id);
    const isWrong = state.wrongIds.has(id);
    const userPoints = state.userPoints[id];
    const pointsMatch = userPoints === q.points;
    let tags = '';
    if (isWrong) tags += '<span class="tag tag-wrong">❌ 错题</span>';
    else if (isCorrect) tags += '<span class="tag tag-correct">✅ 正确</span>';
    else tags += '<span class="tag tag-pending">⏳ 已看答案</span>';
    if (isFav) tags += '<span class="tag tag-fav">⭐ 收藏</span>';
    if (userPoints !== undefined) {
      tags += pointsMatch
        ? '<span class="tag tag-correct">🎯 要点✓</span>'
        : '<span class="tag tag-partial">🎯 要点✗</span>';
    }
    const recite = getReciteInfo(q);
    const mnemonic = canShowMnemonic(id) ? getMnemonic(q) : '';
    const tagHtml = renderSourceBadges(q) +
                    `<span class="tag-badge tag-difficulty ${recite.cls}" style="margin-bottom:0;margin-top:-4px;">${escapeHtml(recite.label)}</span>` +
                    (mnemonic ? `<span class="tag-badge tag-mnemonic" style="margin-bottom:0;margin-top:-4px;">${escapeHtml(mnemonic)}</span>` : '');
    html += `<div class="list-item" data-id="${id}"><div class="topic">${escapeHtml(q.topic)}</div><div style="display:flex;gap:4px;flex-wrap:wrap;margin:2px 0 4px;">${tagHtml}</div><div class="q">${escapeHtml(q.question)}</div><div class="a">${renderAnswerHtml(q)}</div><div class="meta">${tags}</div></div>`;
  });
  container.innerHTML = html;
  container.querySelectorAll('.list-item').forEach(item => {
    item.addEventListener('click', () => {
      const id = parseInt(item.dataset.id);
      if (!sourceMatches(id)) {
        state.sourceFilter = getQuestionTags(QUESTIONS[id])[0] || 'all';
        localStorage.setItem('xigai_source_filter', state.sourceFilter);
        buildSidebar();
      }
      if (state.practiceMode !== 'all' && !practiceMatches(id)) {
        resetPracticeMode(false);
        buildSidebar();
      }
      state.current = id;
      restoreQuestionState();
      switchView('main');
    });
    item.style.cursor = 'pointer';
  });
  updateSidebar();
}

function moveBetweenPointInputs(currentId, delta) {
  const idx = parseInt(String(currentId).split('_')[1]);
  if (Number.isNaN(idx)) return false;
  const next = document.getElementById('pointInput_' + (idx + delta));
  if (!next) return true;
  next.focus();
  if (typeof next.setSelectionRange === 'function') {
    const end = next.value.length;
    next.setSelectionRange(end, end);
  }
  return true;
}

// Keyboard: Enter → 确认/核对/下一题；Shift+Enter → 换行
document.addEventListener('keydown', e => {
  const targetTag = e.target.tagName;
  const targetId = e.target.id || '';

  if (!state.checked && targetId.startsWith('pointInput_')) {
    if (e.key === 'ArrowLeft') {
      e.preventDefault();
      moveBetweenPointInputs(targetId, -1);
      return;
    }
    if (e.key === 'ArrowRight') {
      e.preventDefault();
      moveBetweenPointInputs(targetId, 1);
      return;
    }
  }

  if (targetTag !== 'TEXTAREA' && targetTag !== 'INPUT') {
    if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); return; }
    if (e.key === 'ArrowRight') { e.preventDefault(); goNext(); return; }
  }

  // Shortcut keys: S=收藏, C=评论 (no modifier keys, not while typing)
  if (!e.ctrlKey && !e.metaKey && !e.altKey) {
    if (e.key === 's' || e.key === 'S') {
      if (targetTag !== 'TEXTAREA' && targetTag !== 'INPUT') {
        toggleFav();
        e.preventDefault();
      }
      return;
    }
    if (e.key === 'c' || e.key === 'C') {
      if (targetTag !== 'TEXTAREA' && targetTag !== 'INPUT') {
        el.btnComment.click();
        e.preventDefault();
      }
      return;
    }
  }

  if (targetTag === 'TEXTAREA') {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      const id = targetId;
      if (id && id.startsWith('pointInput_')) {
        const idx = parseInt(id.split('_')[1]);
        const next = document.getElementById('pointInput_' + (idx + 1));
        if (next) { next.focus(); return; }
      }
      if (!state.checked) {
        checkAnswer();
      } else {
        goNext();
      }
    }
    return;
  }
  if (targetTag === 'INPUT') {
    if (e.key === 'Enter') {
      e.preventDefault();
      confirmPoints();
    }
    return;
  }
});

// ========== SIDEBAR ==========
function buildSourceFilter() {
  const container = document.getElementById('sourceFilter');
  if (!container) return;
  const tags = getSourceTags();
  const btn = (value, label, count) =>
    `<button type="button" class="source-filter-btn${state.sourceFilter === value ? ' active' : ''}" data-source="${escapeHtml(value)}">${escapeHtml(label)} ${count}</button>`;
  const allCount = allVisibleQuestionIds('all').length;
  let html = btn('all', '全部', allCount);
  tags.forEach(tag => {
    html += btn(tag, tag, allVisibleQuestionIds(tag).length);
  });
  container.innerHTML = html;
  container.querySelectorAll('.source-filter-btn').forEach(button => {
    button.addEventListener('click', () => setSourceFilter(button.dataset.source || 'all'));
  });
}

function setSourceFilter(filter) {
  state.sourceFilter = filter || 'all';
  localStorage.setItem('xigai_source_filter', state.sourceFilter);
  const activeIds = activeQuestionIds();
  buildSidebar();
  if (activeIds.length) {
    if (!sourceMatches(state.current) || state.dismissedIds.has(state.current)) {
      state.current = activeIds[0];
    }
    restoreQuestionState();
    switchView('main');
  } else {
    switchView('dismissed');
    updateStats();
    updateSaveSummary();
    updatePracticeUI();
  }
}

function applySidebarFilters() {
  const input = document.getElementById('sidebarSearch');
  const q = input ? input.value.trim().toLowerCase() : '';
  document.querySelectorAll('.side-item').forEach(item => {
    const idx = parseInt(item.dataset.idx);
    const question = QUESTIONS[idx];
    const text = item.querySelector('.s-text').textContent.toLowerCase();
    const topic = question.topic.toLowerCase();
    const tag = getQuestionTags(question).join(' ').toLowerCase();
    const matchText = !q || text.includes(q) || topic.includes(q) || tag.includes(q);
    item.style.display = matchText ? '' : 'none';
  });
  document.querySelectorAll('.topic-group').forEach(g => {
    const visible = [...g.querySelectorAll('.side-item')].some(item => item.style.display !== 'none');
    g.style.display = visible ? '' : 'none';
  });
}

function buildSidebar() {
  const container = document.getElementById('sidebarList');
  buildSourceFilter();
  const groups = {};
  QUESTIONS.forEach((q, i) => {
    if (state.dismissedIds.has(i)) return; // skip dismissed
    if (!sourceMatches(i)) return;
    if (!practiceMatches(i)) return;
    if (!groups[q.topic]) groups[q.topic] = [];
    groups[q.topic].push({ idx: i, q });
  });
  let html = '';
  for (const [topic, items] of Object.entries(groups)) {
    html += `<div class="topic-group"><div class="topic-group-title">${escapeHtml(topic)}</div>`;
    items.forEach(({ idx, q }) => {
      const recite = getReciteInfo(q);
      const diffCls = recite.cls ? ` ${recite.cls}` : '';
      const mnemonic = canShowMnemonic(idx) ? getMnemonic(q, true) : '';
      const tagHtml = renderSourceBadges(q, 'side-tag') +
                      `<span class="tag-badge tag-difficulty side-tag${diffCls}">${escapeHtml(recite.label)}</span>` +
                      (mnemonic ? `<span class="tag-badge tag-mnemonic side-tag side-mnemonic">${escapeHtml(mnemonic)}</span>` : '');
      html += `<div class="side-item" data-idx="${idx}"><span class="s-num">#${idx+1}</span><span class="s-body"><span class="s-text">${escapeHtml(q.question)}</span><span class="s-meta">${tagHtml}</span></span><span class="s-dot pending" id="sdot_${idx}"></span></div>`;
    });
    html += '</div>';
  }
  const modeText = state.practiceMode === 'all' ? '' : `${getPracticeLabel()}中`;
  const emptyText = state.sourceFilter === 'all'
    ? `${modeText || '所有题目'}没有可刷题目`
    : `${modeText}“${escapeHtml(state.sourceFilter)}” 下没有可刷题目`;
  container.innerHTML = html || `<div class="source-filter-empty">${emptyText}</div>`;
  container.querySelectorAll('.side-item').forEach(item => {
    item.addEventListener('click', () => {
      state.current = parseInt(item.dataset.idx);
      restoreQuestionState();
      switchView('main');
      closeSidebar();
    });
  });
  applySidebarFilters();
}

function updateSidebar() {
  // Just update status dots and active state on existing items
  document.querySelectorAll('.side-item').forEach(item => {
    const idx = parseInt(item.dataset.idx);
    item.classList.toggle('active', idx === state.current);
    const dot = document.getElementById(`sdot_${idx}`);
    if (dot) {
      dot.className = 's-dot';
      if (state.favorites.has(idx)) dot.classList.add('fav');
      else if (state.wrongIds.has(idx)) dot.classList.add('wrong');
      else if (state.answered[idx] && state.results[idx] === true) dot.classList.add('correct');
      else dot.classList.add('pending');
    }
  });
  const active = document.querySelector('.side-item.active');
  if (active) {
    const list = document.getElementById('sidebarList');
    const rect = active.getBoundingClientRect();
    const listRect = list.getBoundingClientRect();
    if (rect.bottom > listRect.bottom || rect.top < listRect.top) {
      active.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
  }
}

document.getElementById('sidebarSearch').addEventListener('input', applySidebarFilters);

function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); }
document.getElementById('sidebarToggle').addEventListener('click', openSidebar);
document.getElementById('sidebarClose').addEventListener('click', closeSidebar);
document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

// ========== THEME TOGGLE ==========
(function initTheme() {
  const saved = localStorage.getItem('xigai_theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const dark = saved ? saved === 'dark' : prefersDark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  const btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = dark ? '☀️' : '🌙';
})();

document.getElementById('themeToggle')?.addEventListener('click', () => {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('xigai_theme', next);
  document.getElementById('themeToggle').textContent = next === 'dark' ? '☀️' : '🌙';
});

// ========== INIT ==========
// If current question is dismissed, find first active one
const initialActiveIds = activeQuestionIds();
if (initialActiveIds.length === 0) {
  state.current = 0;
  buildSidebar();
  updateSubjectUI();
  switchView('dismissed');
} else {
  if (state.dismissedIds.has(state.current) || !subjectMatches(state.current)) state.current = initialActiveIds[0];
  buildSidebar();
  updateSubjectUI();
  restoreQuestionState();
  renderQuestion(state.current);
}
updateStats();
updateSaveSummary();
console.log(`✅ 习概刷题已加载，共 ${QUESTIONS.length} 题`);
</script>
